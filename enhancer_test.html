<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Enhancer Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        canvas { max-width: 100%; height: auto; border-radius: 1rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .comparison-container { display: grid; grid-template-cols: 1fr 1fr; gap: 2rem; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-black mb-2 tracking-tight">Image Enhancer <span class="text-sky-400">Lab</span></h1>
            <p class="text-slate-400">Test the sharpening engine for newspaper clippings.</p>
        </header>

        <div class="glass rounded-[2.5rem] p-8 mb-12">
            <div class="flex flex-wrap gap-6 items-center justify-center mb-10">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                <button onclick="document.getElementById('fileInput').click()" class="bg-sky-500 hover:bg-sky-600 px-8 py-4 rounded-2xl font-bold transition-all shadow-xl shadow-sky-500/20">UPLOAD IMAGE</button>
                <div class="h-10 w-px bg-slate-700"></div>
                <button id="btnGemini" onclick="digitizeWithGemini()" class="bg-emerald-500 hover:bg-emerald-600 px-8 py-4 rounded-2xl font-bold transition-all shadow-xl shadow-emerald-500/20 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    DIGITIZE WITH GEMINI
                </button>
                <div class="h-10 w-px bg-slate-700"></div>
                <div class="flex gap-2">
                    <button onclick="applyPreset('newspaper')" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl text-xs font-bold border border-slate-700 transition-all">NEWSPAPER MODE</button>
                    <button onclick="applyPreset('highContrast')" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl text-xs font-bold border border-slate-700 transition-all">HIGH CONTRAST</button>
                    <button onclick="applyPreset('sharpen')" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl text-xs font-bold border border-slate-700 transition-all">ULTRA SHARP</button>
                    <button onclick="applyPreset('watermark')" class="bg-rose-600 hover:bg-rose-700 px-4 py-2 rounded-xl text-xs font-bold shadow-lg shadow-rose-900/20 transition-all">WATERMARK REMOVER</button>
                </div>
            </div>

            <div class="comparison-container">
                <div class="space-y-4">
                    <h3 class="text-center font-bold text-slate-500 uppercase text-xs tracking-widest">Original Image</h3>
                    <div id="originalWrapper" class="relative group">
                        <img id="originalImg" src="" class="hidden">
                        <canvas id="originalCanvas"></canvas>
                    </div>
                </div>
                <div class="space-y-4">
                    <h3 class="text-center font-bold text-sky-400 uppercase text-xs tracking-widest">Enhanced Result</h3>
                    <div id="enhancedWrapper" class="relative group">
                        <canvas id="enhancedCanvas"></canvas>
                        <a id="downloadBtn" class="absolute top-4 right-4 bg-white text-black px-4 py-2 rounded-xl font-bold text-xs opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap hidden">DOWNLOAD ENHANCED</a>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="digitizeStatus" class="hidden text-center font-bold text-emerald-400 mb-8 animate-pulse text-sm"></div>
        <div id="digitalPreviewArea"></div>
        
        <!-- ADJUSTMENT SLIDERS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 rounded-3xl">
                <label class="block text-xs font-bold text-slate-400 mb-4 uppercase">Contrast (<span id="valContrast">1.4</span>)</label>
                <input type="range" id="contrastRange" min="0.5" max="3" step="0.1" value="1.4" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-sky-500" oninput="manualAdjust()">
            </div>
            <div class="glass p-6 rounded-3xl">
                <label class="block text-xs font-bold text-slate-400 mb-4 uppercase">Brightness (<span id="valBrightness">1.1</span>)</label>
                <input type="range" id="brightnessRange" min="0.5" max="2" step="0.1" value="1.1" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-sky-500" oninput="manualAdjust()">
            </div>
            <div class="glass p-6 rounded-3xl">
                <label class="block text-xs font-bold text-slate-400 mb-4 uppercase">Sharpness Level (<span id="valSharp">2</span>)</label>
                <input type="range" id="sharpRange" min="0" max="5" step="0.5" value="2" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-sky-500" oninput="manualAdjust()">
            </div>
            <div class="glass p-6 rounded-3xl">
                <label class="block text-xs font-bold text-slate-400 mb-4 uppercase">Smooth/Blur (<span id="valSmooth">0</span>)</label>
                <input type="range" id="smoothRange" min="0" max="10" step="0.5" value="0" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-sky-500" oninput="manualAdjust()">
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const originalImg = document.getElementById('originalImg');
        const originalCanvas = document.getElementById('originalCanvas');
        const enhancedCanvas = document.getElementById('enhancedCanvas');
        const downloadBtn = document.getElementById('downloadBtn');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    originalImg.src = event.target.result;
                    originalImg.onload = () => {
                        initCanvases();
                        processImage();
                    };
                };
                reader.readAsDataURL(file);
            }
        });

        function initCanvases() {
            [originalCanvas, enhancedCanvas].forEach(canvas => {
                canvas.width = originalImg.naturalWidth;
                canvas.height = originalImg.naturalHeight;
            });
            const ctxOrig = originalCanvas.getContext('2d');
            ctxOrig.drawImage(originalImg, 0, 0);
        }

        function applyPreset(type) {
            const c = document.getElementById('contrastRange');
            const b = document.getElementById('brightnessRange');
            const s = document.getElementById('sharpRange');
            const sm = document.getElementById('smoothRange');

            if(type === 'newspaper') { c.value = 1.6; b.value = 1.2; s.value = 1.5; sm.value = 0; }
            if(type === 'highContrast') { c.value = 2.2; b.value = 1.0; s.value = 1.0; sm.value = 0; }
            if(type === 'sharpen') { c.value = 1.3; b.value = 1.1; s.value = 4.0; sm.value = 0; }
            if(type === 'watermark') { 
                // Matching PHP: Grayscale, Brightness 30, Contrast -45, Smooth 2
                c.value = 0.6; // Reduced contrast to wash out watermark
                b.value = 1.4; // High brightness to turn logo into white
                s.value = 0; 
                sm.value = 4; // Smoothing to bleed edges
            }

            manualAdjust();
        }

        function manualAdjust() {
            document.getElementById('valContrast').innerText = document.getElementById('contrastRange').value;
            document.getElementById('valBrightness').innerText = document.getElementById('brightnessRange').value;
            document.getElementById('valSharp').innerText = document.getElementById('sharpRange').value;
            document.getElementById('valSmooth').innerText = document.getElementById('smoothRange').value;
            processImage();
        }

        function processImage() {
            if(!originalImg.src) return;
            const ctx = enhancedCanvas.getContext('2d');
            const contrast = document.getElementById('contrastRange').value;
            const brightness = document.getElementById('brightnessRange').value;
            const sharpLevel = document.getElementById('sharpRange').value;
            const smoothLevel = document.getElementById('smoothRange').value;

            ctx.filter = `contrast(${contrast}) brightness(${brightness}) grayscale(1) blur(${smoothLevel}px)`;
            ctx.drawImage(originalImg, 0, 0);

            if(sharpLevel > 0) {
                const amount = parseFloat(sharpLevel);
                const kernel = [0, -amount, 0, -amount, 4 * amount + 1, -amount, 0, -amount, 0];
                applyConvolution(enhancedCanvas, kernel);
            }

            downloadBtn.href = enhancedCanvas.toDataURL('image/webp', 0.8);
            downloadBtn.download = "watermark_removed.webp";
            downloadBtn.classList.remove('hidden');
        }

        // --- GEMINI POWERED DIGITIZATION ---
        const geminiKey = ""; // Paste here or hardcode

        async function digitizeWithGemini() {
            const status = document.getElementById('digitizeStatus');
            if(!originalImg.src) { status.innerText = "❌ Pehle image upload karein!"; status.classList.remove('hidden'); return; }
            if(!geminiKey) { status.innerText = "❌ Pehle Gemini API Key dalo code mein (Line 150)!"; status.classList.remove('hidden'); return; }

            const btn = document.getElementById('btnGemini');
            btn.disabled = true;
            status.innerText = "Gemini is Digitizing Image (OCR + Redrawing)...";
            status.classList.remove('hidden');

            try {
                const base64 = originalImg.src;
                const prompt = `ACT AS A SENIOR GRAPHIC DESIGNER AND OCR EXPERT. 
                TASK: Transform this blurry, low-quality newspaper job advertisement into a PREMIUM, SHARP HD DIGITAL JOB CARD.
                
                STEP 1: METICULOUS OCR
                - Extract every single word. Do not skip small text.
                - Identify Department Name, Job Title, BPS Scales, Education, Age Limit, and Last Date to Apply.
                
                STEP 2: PREMIUM DESIGN SYSTEM (Tailwind CSS)
                - Container: max-w-2xl, bg-white, rounded-[2.5rem], shadow-2xl, border-t-[12px] border-emerald-600.
                - Typography: Use 'Plus Jakarta Sans' or 'Inter'. Bold, dark slate headers (#0f172a).
                - Layout: 
                  * Header: Department logo placeholder (SVG) + Large Bold Title.
                  * Badge: Estimated Last Date in a pulse-red badge.
                  * Body: A perfectly clean, alternate-row colored Table for Positions and Qualifications.
                  * Footer: Large "APPLY NOW" section with Apply Method clearly listed.
                
                STEP 3: POST-PROCESSING
                - Remove all newspaper artifacts, ink bleeds, and scan noise.
                - Output ONLY the HTML/CSS code inside <div id="digitalCard">. Use inline Tailwind classes.
                
                This must look like a professional LinkedIn or Indeed job post, NOT a scan.`;

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`;
                const payload = { contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64.split(',')[1] } }] }] };
                
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await res.json();
                const html = data.candidates[0].content.parts[0].text.replace(/```html/gi, '').replace(/```/g, '');

                // Render Result
                const previewArea = document.getElementById('digitalPreviewArea');
                previewArea.innerHTML = `<div class="bg-white p-10 rounded-3xl shadow-2xl border border-slate-200 mt-10 min-h-[600px] text-slate-900 overflow-hidden">
                    <h2 class="text-xs font-black text-sky-600 mb-6 uppercase tracking-[0.2em] border-b pb-2">AI Generated HD Digital Copy</h2>
                    <div class="scale-90 origin-top transform">${html}</div>
                </div>`;
                previewArea.scrollIntoView({ behavior: 'smooth' });
                status.innerText = "Generation Success! HD Card Ready Below.";
            } catch(e) {
                status.innerText = "Error: " + e.message;
            } finally {
                btn.disabled = false;
            }
        }

        function applyConvolution(canvas, kernel) {
            const ctx = canvas.getContext('2d');
            const sw = canvas.width;
            const sh = canvas.height;
            const idata = ctx.getImageData(0, 0, sw, sh);
            const data = idata.data;
            const output = ctx.createImageData(sw, sh);
            const outData = output.data;

            for (let y = 1; y < sh - 1; y++) {
                for (let x = 1; x < sw - 1; x++) {
                    for (let c = 0; c < 3; c++) {
                        let i = (y * sw + x) * 4 + c;
                        let res = 
                            data[((y - 1) * sw + (x - 1)) * 4 + c] * kernel[0] +
                            data[((y - 1) * sw + x) * 4 + c] * kernel[1] +
                            data[((y - 1) * sw + (x + 1)) * 4 + c] * kernel[2] +
                            data[(y * sw + (x - 1)) * 4 + c] * kernel[3] +
                            data[(y * sw + x) * 4 + c] * kernel[4] +
                            data[(y * sw + (x + 1)) * 4 + c] * kernel[5] +
                            data[((y + 1) * sw + (x - 1)) * 4 + c] * kernel[6] +
                            data[((y + 1) * sw + x) * 4 + c] * kernel[7] +
                            data[((y + 1) * sw + (x + 1)) * 4 + c] * kernel[8];
                        outData[i] = res;
                    }
                    outData[(y * sw + x) * 4 + 3] = 255; // Alpha
                }
            }
            ctx.putImageData(output, 0, 0);
        }
    </script>
</body>
</html>
