<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SEO Article & Automation Master (Pro)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0284c7;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 1);
        }

        .prose h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-top: 2rem;
            margin-bottom: 1.5rem;
            color: #0f172a;
            line-height: 1.2;
            border-bottom: 3px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .prose h2 {
            font-size: 1.85rem;
            font-weight: 700;
            margin-top: 2.5rem;
            margin-bottom: 1.25rem;
            color: #1e293b;
            display: flex;
            align-items: center;
        }

        .prose h2::before {
            content: "";
            width: 6px;
            height: 30px;
            background: #0284c7;
            margin-right: 12px;
            border-radius: 4px;
        }

        .prose p {
            margin-bottom: 1.5rem;
            line-height: 1.9;
            font-size: 1.15rem;
            color: #475569;
            text-align: justify;
        }

        .schema-badge {
            background: #f1f5f9;
            color: #475569;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen p-4 md:p-10 text-slate-900">
    <div class="max-w-4xl mx-auto">

        <!-- AUTO FETCH BAR -->
        <div
            class="glass-effect rounded-3xl p-4 mb-8 flex justify-between items-center border border-slate-200 shadow-lg">
            <div class="flex items-center gap-4">
                <button id="btnFetchNext"
                    class="bg-black text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 transition-all flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                    </svg>
                    FETCH NEXT
                </button>
                <div class="text-xs">
                    <div id="jobIdDisplay" class="font-bold text-slate-400">NO JOB SELECTED</div>
                    <div id="jobTitleDisplay" class="font-bold text-slate-800 truncate max-w-[200px]">Waiting for
                        fetch...</div>
                </div>
                <button id="btnSkip"
                    class="bg-red-50 text-red-600 px-6 py-3 rounded-xl font-bold hover:bg-red-100 transition-all border border-red-100 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                    SKIP IMAGE
                </button>
            </div>
            <div id="automationStatus"
                class="text-[10px] font-bold text-sky-600 uppercase tracking-widest bg-sky-50 px-3 py-1 rounded-full">
                Automated Mode Active</div>
        </div>

        <header class="text-center mb-12">
            <h1 class="text-5xl font-black text-slate-900 mb-4 tracking-tight">AI SEO Content Engine</h1>
            <p class="text-xl text-slate-600">Image se 100% SEO-optimized article aur auto-sync to website.</p>
        </header>

        <!-- Input Section -->
        <div class="glass-effect rounded-[2rem] p-8 shadow-2xl mb-12 border border-slate-200">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-slate-700 uppercase tracking-wider">Image / Source
                        Link</label>
                    <input type="text" id="imageUrl" placeholder="Paste link here or click Fetch"
                        class="w-full px-5 py-4 border border-slate-300 rounded-2xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 focus:outline-none transition-all">
                </div>
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-slate-700 uppercase tracking-wider">File Upload</label>
                    <input type="file" id="imageFile" accept="image/*"
                        class="w-full px-5 py-3 border border-slate-300 rounded-2xl bg-white cursor-pointer file:mr-4 file:py-2 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-sky-50 file:text-sky-700 hover:file:bg-sky-100 transition-all">
                </div>
            </div>

            <div class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div
                    class="flex flex-col items-center justify-center p-4 bg-slate-50 border border-slate-200 rounded-xl">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="humanizeToggle" class="sr-only peer">
                        <div
                            class="w-14 h-7 bg-slate-300 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-emerald-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[4px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-emerald-500">
                        </div>
                        <span class="ml-3 text-sm font-black text-slate-800 tracking-wide uppercase">HUMANIZE</span>
                    </label>
                </div>
                <!-- WATERMARK REMOVED FROM UI BUT KEPT LOGIC -->
                <div
                    class="flex flex-col items-center justify-center p-4 bg-slate-50 border border-slate-200 rounded-xl">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="autoPublishToggle" class="sr-only peer" checked>
                        <div
                            class="w-14 h-7 bg-slate-300 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-sky-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[4px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-sky-500">
                        </div>
                        <span class="ml-3 text-sm font-black text-slate-800 tracking-wide uppercase">AUTO PUBLISH</span>
                    </label>
                </div>
            </div>

            <div class="mt-10 flex flex-col items-center">
                <div id="imagePreviewContainer"
                    class="hidden mb-10 w-full max-w-lg border-8 border-white shadow-2xl rounded-[2.5rem] overflow-hidden relative group">
                    <img id="imagePreview" src="" alt="Preview"
                        class="w-full h-auto object-contain transition-all duration-300">
                    <div
                        class="absolute bottom-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button id="btnEnhance"
                            class="bg-white/90 backdrop-blur text-slate-900 px-4 py-2 rounded-xl text-xs font-black shadow-xl hover:bg-sky-600 hover:text-white transition-all">🪄
                            ENHANCE (AI)</button>
                        <button id="btnResetImg"
                            class="bg-white/90 backdrop-blur text-slate-900 px-4 py-2 rounded-xl text-xs font-black shadow-xl hover:bg-red-600 hover:text-white transition-all">REVERT</button>
                    </div>
                </div>

                <button id="processBtn"
                    class="bg-sky-600 hover:bg-sky-700 text-white font-black py-5 px-20 rounded-2xl transition-all shadow-xl hover:shadow-sky-200 active:scale-95 flex items-center justify-center min-w-[350px] text-lg">
                    <span id="btnText">GENERATE & SUBMIT TO SITE</span>
                </button>
            </div>
        </div>

        <div id="statusBox" class="hidden mb-10 p-6 rounded-3xl text-center font-bold shadow-lg border-2 animate-pulse">
        </div>

        <!-- Submission Report -->
        <div id="submissionReport"
            class="hidden bg-emerald-50 border-l-[6px] border-emerald-500 p-8 rounded-[2rem] shadow-xl mb-12">
            <h3 class="text-2xl font-black text-emerald-900 mb-2">🚀 Job Live on Dashboard!</h3>
            <p class="text-emerald-700 text-sm">Category, City, and Article have been synced successfully.</p>
        </div>

        <!-- Results Master Section -->
        <div id="results" class="hidden space-y-12 pb-20">
            <div id="ocrCard" class="bg-white rounded-[2rem] p-8 shadow-xl border border-slate-100">
                <h3 class="text-xl font-extrabold text-slate-800 mb-4 flex items-center gap-3"><svg
                        class="w-6 h-6 text-sky-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                        </path>
                    </svg> Raw Scanned Text</h3>
                <div id="ocrContent"
                    class="text-slate-600 bg-slate-50 p-6 rounded-2xl whitespace-pre-wrap font-mono text-sm leading-relaxed max-h-48 overflow-y-auto italic border border-slate-100">
                </div>
            </div>

            <!-- SEO Article & Schema Card -->
            <div class="bg-white rounded-[2.5rem] p-10 shadow-2xl border-t-[16px] border-sky-600 relative">
                <div class="flex flex-wrap gap-3 mb-10 items-center">
                    <span class="bg-sky-600 text-white px-4 py-1.5 rounded-full text-xs font-black uppercase">Automated
                        Post</span>
                </div>
                <div id="articleContent" class="prose prose-slate max-w-none"></div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // Fill this once or use with extension/proxy
        const API_BASE = '/api';
        let currentJobId = null;

        const processBtn = document.getElementById('processBtn');
        const btnText = document.getElementById('btnText');
        const statusBox = document.getElementById('statusBox');
        const imagePreview = document.getElementById('imagePreview');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const results = document.getElementById('results');
        const ocrContent = document.getElementById('ocrContent');
        const articleContent = document.getElementById('articleContent');

        // --- FETCH ACTION ---
        document.getElementById('btnFetchNext').onclick = async () => {
            try {
                showStatus("Fetching next job...", "info");
                const res = await fetch(`${API_BASE}/pending-images`);
                const data = await res.json();

                if (!data) { showStatus("No pending images found.", "success"); return; }

                currentJobId = data.id;
                document.getElementById('imageUrl').value = data.image_url;
                imagePreview.src = data.image_url;
                imagePreviewContainer.classList.remove('hidden');
                document.getElementById('jobIdDisplay').innerText = `JOB ID: ${data.id}`;
                document.getElementById('jobTitleDisplay').innerText = data.title;
                showStatus("Ready! Click Generate to finish.", "success");
            } catch (e) { showStatus("Fetch failed. Is Laravel running?", "error"); }
        };

        // --- SKIP ACTION ---
        document.getElementById('btnSkip').onclick = async () => {
            if (!currentJobId) return;
            if (!confirm("Kiya aap is image ko skip karna chahte hain?")) return;
            try {
                showStatus("Skipping image...", "info");
                await fetch(`${API_BASE}/skip-image`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ job_source_image_id: currentJobId })
                });
                document.getElementById('btnFetchNext').click(); // Auto-fetch next
                showNotif("Image marked as processed (skipped).", "red");
            } catch (e) { showStatus("Skip failed.", "error"); }
        };

        // --- IMAGE ENHANCER LOGIC ---
        let originalImageData = null;
        document.getElementById('btnEnhance').onclick = () => {
            const img = document.getElementById('imagePreview');
            if (!originalImageData) originalImageData = img.src;

            showStatus("Enhancing contrast & sharpening text...", "info");
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;

            // Draw original
            ctx.drawImage(img, 0, 0);

            // Apply Filters (Contrast + Sharpness)
            ctx.filter = 'contrast(1.4) brightness(1.1) saturate(0) grayscale(1)'; // Best for newspaper text
            ctx.drawImage(canvas, 0, 0);

            // Convolution Sharpening
            const weights = [0, -1, 0, -1, 5, -1, 0, -1, 0];
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            // ... (Simple convolution if needed, but CSS filter is often enough for performance)

            img.src = canvas.toDataURL('image/png');
            showStatus("Image Enhanced for OCR!", "success");
        };

        document.getElementById('btnResetImg').onclick = () => {
            if (originalImageData) {
                document.getElementById('imagePreview').src = originalImageData;
                showStatus("Image reset to original.", "info");
            }
        };

        // --- MASTER AUTOMATION ---
        processBtn.addEventListener('click', async () => {
            const fileInput = document.getElementById('imageFile');
            const urlInput = document.getElementById('imageUrl').value.trim();
            let base64Image = '';

            try {
                setLoading(true);
                statusBox.classList.remove('hidden');
                results.classList.add('hidden');
                document.getElementById('submissionReport').classList.add('hidden');

                if (fileInput.files.length > 0) {
                    base64Image = await new Promise(res => { const r = new FileReader(); r.onload = (e) => res(e.target.result); r.readAsDataURL(fileInput.files[0]); });
                } else if (urlInput) {
                    base64Image = await fetchImageAsBase64(urlInput);
                } else { throw new Error("Pehle image dalo."); }

                // --- NEW: Load Internal Links Context ---
                showStatus("Loading SEO context from Laravel...", "info");
                try {
                    const seoRes = await fetch(`${API_BASE}/internal-links`);
                    const seoData = await seoRes.json();
                    const relatedJobs = seoData.general_jobs || [];
                    internalLinksContext = "RELATED JOBS FOR INTERLINKING:\n" + relatedJobs.slice(0, 5).map(j => `- ${j.title}`).join('\n');
                } catch (e) { console.warn("Internal links fetch failed, continuing without them."); }

                showStatus("AI is analyzing and writing the article...", "info");

                const humanizeOn = document.getElementById('humanizeToggle').checked;
                const toneStyle = humanizeOn ? "Use Grade 5 English, conversational tone, rhetorical questions, simple words only." : "Professional SEO style.";
                const currentYear = new Date().getFullYear();

                const prompt = `Analyze this job image for the year ${currentYear}:
                
                1. OCR: Extract all genuine text and start with OCR_START:
                2. METADATA: 
                   - TITLE_START: [Professional SEO Job Title]
                   - CAT_START: [1 Best Category Name, e.g., 'Govt Jobs', 'Education Jobs']
                   - CITY_START: [1 Best City Name]
                3. ARTICLE_START: Write a long (1500+ words) highly engaging English article in HTML format.
                   - READ TIME BADGES: Immediately under the H1 title, insert HTML: <div class="flex flex-wrap gap-3 mb-8 mt-4"><span class="bg-sky-100 text-sky-800 text-sm font-bold px-4 py-1.5 rounded-full border border-sky-200">⏱️ 8 Min Read</span><span class="bg-emerald-100 text-emerald-800 text-sm font-bold px-4 py-1.5 rounded-full border border-emerald-200">📅 Last Updated: Today</span></div>
                   - AGE/QUALIFICATION SNIPPET: Create a highlighted HTML block: <div class="bg-amber-50 p-5 rounded-2xl border-l-[6px] border-amber-500 mb-8 shadow-sm"><h4 class="font-extrabold text-lg text-amber-900 mb-2">🚀 Quick Eligibility Snippet</h4><p class="text-amber-800"><strong>Age Limit:</strong> [Age]</p><p class="text-amber-800"><strong>Qualification:</strong> [Req]</p></div>
                   - OVERVIEW TABLE: Next, add a Markdown/HTML Table containing Name, Positions, Location, Estimated Salary, Last Date, etc.
                   - URGENCY TRACKER: Right below the table, output an HTML warning: <div class="text-red-700 font-bold bg-red-50 p-4 rounded-xl border border-red-200 mt-2 mb-8 animate-pulse text-center">⚠️ Hurry Up! Last Date to Apply is [Date].</div> 
                   - PROS & CONS: Add an H3 section titled "Pros & Cons of this Job". Provide a clean bulleted list using ✅ for Pros and ❌ for Cons.
                   - HOW TO APPLY & CTA: Create a Step-by-Step numbered list for applying. End it with: <div class="text-center mt-8 mb-12"><a href="#" class="inline-block bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 px-10 rounded-full shadow-xl transition-all transform hover:scale-105 active:scale-95 text-xl">Apply Online Now</a></div>
                   - SYLLABUS & INTERVIEW PREP: Dedicate an H2 section to "Expected Syllabus & Test Pattern". Then add an H3 section for "Top 5 Expected Interview Questions".
                   - MINI MCQ TEST: End with an H3 section "🧠 Mini Syllabus Quiz" with 10 multiple-choice questions.
                   - INTERLINKING: Naturally interlink these jobs if they are related: ${internalLinksContext}
                   - SEO: Use powerful H2/H3s including the year ${currentYear}.
                   - ${toneStyle}
                4. SCHEMA_START: Generate a valid JSON-LD JobPosting schema script.
                
                Format markers EXACTLY: OCR_START, TITLE_START, CAT_START, CITY_START, ARTICLE_START, SCHEMA_START.`;

                const response = await callGemini(prompt, base64Image);

                // Parsing
                const ocr = (response.match(/OCR_START:\s*([\s\S]*?)TITLE_START/i) || ["", ""])[1].trim();
                const title = (response.match(/TITLE_START:\s*([\s\S]*?)CAT_START/i) || ["", ""])[1].trim();
                const catName = (response.match(/CAT_START:\s*([\s\S]*?)CITY_START/i) || ["", ""])[1].trim();
                const cityName = (response.match(/CITY_START:\s*([\s\S]*?)ARTICLE_START/i) || ["", ""])[1].trim();
                const html = (response.match(/ARTICLE_START:\s*([\s\S]*?)SCHEMA_START/i) || ["", ""])[1].trim();
                const schema = (response.match(/SCHEMA_START:\s*([\s\S]*?)$/i) || ["", ""])[1].trim();

                ocrContent.innerText = ocr;

                // --- Laravel API Integration ---
                showStatus("Syncing with Laravel Dashboard...", "info");

                const catRes = await fetch(`${API_BASE}/categories`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: catName }) });
                const catData = await catRes.json();

                const cityRes = await fetch(`${API_BASE}/cities`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: cityName }) });
                const cityData = await cityRes.json();

                const publishRes = await fetch(`${API_BASE}/submit-article`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        job_source_image_id: currentJobId,
                        title: title,
                        description: html,
                        category_id: catData.id,
                        city_id: cityData.id,
                        schema_json: schema,
                        is_active: document.getElementById('autoPublishToggle').checked
                    })
                });

                if (publishRes.ok) {
                    articleContent.innerHTML = html;
                    results.classList.remove('hidden');
                    document.getElementById('submissionReport').classList.remove('hidden');
                    showStatus("Success! Article and Data synced perfectly.", "success");
                } else { throw new Error("Laravel Submit Failed."); }

            } catch (error) { showStatus(error.message, "error"); } finally { setLoading(false); }
        });

        // --- UTILS ---
        async function callGemini(prompt, base64Data) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64Data.split(',')[1] } }] }] };
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const data = await res.json();
            if (data.error) throw new Error(data.error.message);
            return data.candidates[0].content.parts[0].text;
        }

        async function fetchImageAsBase64(url) {
            const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
            const blob = await res.blob();
            return new Promise(resolve => { const r = new FileReader(); r.onloadend = () => resolve(r.result); r.readAsDataURL(blob); });
        }

        function showStatus(msg, type) {
            statusBox.innerText = msg;
            statusBox.className = `p-5 rounded-2xl text-center font-bold shadow-lg border-2 ${type === 'error' ? 'bg-red-50 text-red-700 border-red-200' : type === 'info' ? 'bg-sky-50 text-sky-700 border-sky-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200'}`;
            statusBox.classList.remove('hidden');
        }

        function setLoading(isLoading) {
            processBtn.disabled = isLoading;
            btnText.innerHTML = isLoading ? '<span class="loader"></span> Processing Workflow...' : 'GENERATE & SUBMIT TO SITE';
        }

        function showNotif(msg) {
            const notif = document.getElementById('notif');
            document.getElementById('notifMsg').innerText = msg;
            notif.style.opacity = '1'; notif.style.transform = 'translateY(0)';
            setTimeout(() => { notif.style.opacity = '0'; notif.style.transform = 'translateY(20px)'; }, 3000);
        }
    </script>
</body>

</html>
